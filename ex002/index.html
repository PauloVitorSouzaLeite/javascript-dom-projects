<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" media="all">
    <title>Verifique a sua idade</title>
</head>
<body>
    <main class="main-container">
        <header>
            <h1>Verifique a sua idade</h1>
        </header>
        <section class="section">
            <form method="get" class="questions">
                <div class="form-item">
                    <label for="verificador">Digite a sua idade: </label>
                    <input type="number" name="verificador" id="verificador">
                </div>
                <div class="form-button">
                    <button type="button" id="botao">Enviar</button>
                </div>
            </form>
        </section>
        <section id="resultado">
            <div id="bloco"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
