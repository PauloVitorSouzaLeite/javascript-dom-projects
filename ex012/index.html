<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <section class="Container">
        <h2>Cadastre-se</h2>
        <form action="" method="get" autocomplete="on" class="GridContainer">
            <label for="Inome" class="Item1">Nome</label>
            <input type="text" name="UserNome" id="Inome" class="Item2" autocomplete="name">
            <label for="Iemail" class="Item3">Email</label>
            <input type="text" name="UserEmail" id="Iemail" class="Item4" autocomplete="email">
            <button type="button" id="SubmitButton" class="Item5">Enviar</button>
        </form>
    </section>
    <script src="script.js"></script>
</body>
</html>
