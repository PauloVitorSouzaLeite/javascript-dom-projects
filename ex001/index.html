<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <main class="FlexContainer">
        <section class="GridContainer">
            <div class="GridItem" id="DivNumber">0</div>
            <div class="GridItem" id="DivReset"><button type="reset" id="Resetar">Resetar</button></div>
            <div class="GridItem" id="DivLess"><button type="button" id="Diminuir">Diminuir (-)</button></div>
            <div class="GridItem" id="DivMore"><button type="button" id="Aumentar">Aumentar (+)</button></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
